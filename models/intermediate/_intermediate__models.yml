version: 2

models:
  - name: int_claims_classified
    description: >
      Claims enriched with report week calculations and WBR tier classification.
      One row per claim per snapshot_date. Every claim receives tier1, tier2,
      and optionally tier3 category assignment.
    columns:
      - name: claim_snapshot_key
        description: Surrogate key for claim_number + snapshot_date
        data_tests:
          - unique
          - not_null
      - name: snapshot_date
        data_tests:
          - not_null
      - name: report_week
        description: Report week derived from snapshot_date
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 53
      - name: wbr_tier1
        description: Top-level WBR classification
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['ACTIVE CASES', 'CLOSED CASES', 'RE-OPEN CLAIMS']
      - name: wbr_tier2
        description: Second-level WBR classification
        data_tests:
          - not_null
      - name: submitted_week
        description: Report week number from submitted_date
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
                max_value: 53
      - name: value_usd
        description: Trailer value converted to USD
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                strictly: false

  - name: int_claims_reopened
    description: >
      Snapshot-aware helper identifying Open claims that had a Closed status
      in an earlier snapshot.
