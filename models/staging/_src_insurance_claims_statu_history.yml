version: 2

sources:
  - name: raw_claims_status
    description: >
      Append-only missing-trailer insurance claim history loaded into BigQuery.
    database: ray-project-500821  # project ID
    schema: trailer_claims  # Dataset name

    tables:
      - name: insurance_claims_statu_history
        description: >
          Historical claim snapshots. Grain is one row per snapshot_date and
          claim_number; earlier snapshots must remain in the table.
        data_tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns:
                  - snapshot_date
                  - claim_number
        columns:
          - name: snapshot_date
            description: Date when the source state was captured
            data_tests:
              - not_null
          - name: claim_number
            description: Unique identifier for the insurance claim
            data_tests:
              - not_null
          - name: status
            description: Current claim status (Open/Closed)
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['Open', 'Closed']
          - name: submitted
            description: Date the claim was submitted
            data_tests:
              - not_null
          - name: source
            description: Claim provider shown as Provider in the dashboard
            data_tests:
              - not_null
          - name: carrier_name
            description: Insurance carrier shown as Carrier in the dashboard
          - name: country
            description: Claim country used by dashboard filters
