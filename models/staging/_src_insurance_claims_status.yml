version: 2

sources:
  - name: raw_claims_status
    description: >
      Raw 3rd-party missing trailer insurance claims data loaded into BigQuery.
    database: ray-project-500821  # project ID
    schema: trailer_claims  # Dataset name

    tables:
      - name: insurance_claims_status
        description: >
          Append-only claim snapshots. One row per claim per snapshot_date.
        data_tests:
          - dbt_utils.unique_combination_of_columns:
              arguments:
                combination_of_columns:
                  - snapshot_date
                  - claim_number
        columns:
          - name: snapshot_date
            description: Date when the source state was captured
            data_tests:
              - not_null
          - name: claim_number
            description: Unique identifier for the insurance claim
            data_tests:
              - not_null
          - name: status
            description: Current claim status (Open/Closed)
            data_tests:
              - accepted_values:
                  arguments:
                    values: ['Open', 'Closed']
          - name: submitted
            description: Date the claim was submitted
            data_tests:
              - not_null
          - name: source
            description: Claim source system (Sedgwick or Xceedance)
            data_tests:
              - not_null
