name: missing_trailer_claims
version: '1.0.0'
config-version: 2

profile: 'missing_trailer'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  missing_trailer_claims:
    staging:
      +materialized: view
      +schema: staging
      +tags: ['staging', 'daily']
    intermediate:
      +materialized: table
      +schema: intermediate
      +tags: ['intermediate', 'daily']
    marts:
      +materialized: table
      +schema: marts
      +tags: ['marts', 'weekly']

seeds:
  missing_trailer_claims:
    +schema: seeds
    seed_currency_rates:
      +column_types:
        currency_code: string
        currency_name: string
        rate_to_usd: numeric
