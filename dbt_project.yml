name: missing_trailer_claims
version: '1.0.0'
config-version: 2

profile: 'missing_trailer'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # Override at runtime: dbt run --vars '{report_year: 2026, report_week: 22}'
  report_year: 2026
  report_week: 22
  default_source_filter: "all"

models:
  missing_trailer_claims:
    staging:
      +materialized: view
      +schema: staging
      +tags: ['staging', 'daily']
    intermediate:
      +materialized: incremental
      +schema: intermediate
      +tags: ['intermediate', 'daily']
    marts:
      +materialized: table
      +schema: marts
      +tags: ['marts', 'weekly']

seeds:
  missing_trailer_claims:
    +schema: seeds
